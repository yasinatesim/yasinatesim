name: 📝 Update Blog Articles

on:
  schedule:
    - cron: "15 7 * * *"
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Fetch & Update Articles
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: pip install requests feedparser

      - name: 🚀 Run Article Fetcher
        run: python scripts/fetch_articles.py

      - name: 💾 Commit & Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md medium_articles.json
          if git diff --staged --quiet; then
            echo "✅ No changes detected — README already up-to-date."
          else
            git commit -m "📝 Auto-update: Latest blog articles [$(TZ='Europe/Istanbul' date +'%Y-%m-%d')]"
            git push
            echo "✅ Changes committed and pushed."
          fi
